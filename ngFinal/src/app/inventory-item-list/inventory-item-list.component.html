<table *ngIf="!selected">

  <th>ID</th>
  <th>NAME</th>
  <th>DESCRIPTION</th>
  <th>PRICE</th>
  <th>CONDITION</th>
  <th>IMAGE</th>

<tbody>
  {{inventoryItems[0].name}}
<tr *ngFor="let item of inventoryItems">
  <td>{{item.id}}</td>
  <td>{{item.name}}</td>
  <td>{{item.description}}</td>
  <td>{{item.price}}</td>
  <td>{{item.condition}}</td>
  <td>{{item.imgUrl}}</td>

</tr>
</tbody>
</table>
