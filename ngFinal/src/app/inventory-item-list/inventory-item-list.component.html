
<div *ngIf="!selected">
  <div *ngFor="let item of inventoryItems" class="card" style="width: 18rem;">
      <img class="card-img-top" src="item.imgUrl" alt="image">
      <div class="card-body">
        <h5 class="card-title">{{item.name}}</h5>
        <p class="card-text">{{item.description}}</p>
        <p class="card-text">{{item.price | currency}}</p>
        <p class="card-text">{{item.condition}}</p>
        <a href="#" class="btn btn-primary">Rent Me</a>
      </div>
    </div>
</div>
