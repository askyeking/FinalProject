
<form action="" name="registration">
  <input type="text" name="email" placeholder="email" [(ngModel)]="loginUser.email"/><br>
  <input type="text" name="password" placeholder="password" [(ngModel)]="loginUser.password"/><br>
  <input type="button" class="btn btn-danger" value="log in" (click)="login(loginUser)"/>
</form>
