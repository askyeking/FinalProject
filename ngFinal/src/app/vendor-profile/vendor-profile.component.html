<div *ngIf="user && user.vendor">
  <button class="btn btn-outline-success my-2 my-sm-0" type="submit" (click)="setEdit()">Edit</button>

  <div *ngIf="!editUser">
  <img src="{{user.vendor.imgUrl}}" alt="">
  <h1>{{user.vendor.displayName}}</h1>

  <h3>About</h3>
  {{user.vendor.about}} <br>
  <hr>

  <br>
  <br>
  <br>
  <h3>Inventory</h3>
  <div *ngIf="!user.vendor.listedItems">
    No items posted.
  </div>
  <div *ngFor="let item of user.vendor.listedItems" class="card" style="width: 18rem;">
      <img class="card-img-top" [src]="item.imgUrl" alt="image">
      <div class="card-body">
        <h5 class="card-title">{{item.name}}</h5>
        <p class="card-text">{{item.description}}</p>
        <p class="card-text">{{item.price | currency}}</p>
        <p class="card-text">{{item.condition}}</p>
      </div>
      <button class="btn btn-primary" >Rent Me</button>
    </div>
</div>






  <div *ngIf="editUser">
      <h1>{{editUser.email}}</h1>
      {{editUser.password}}
      <form action="">
          Name: <input type="text" name="name" value="editUser.vendor.displayName" [(ngModel)]="editUser.vendor.displayName"  /><br>
          Image URL: <input type="text" name="imageURL" value="editUser.vendor.imgUrl" [(ngModel)]="editUser.vendor.imgUrl"  /><br>
          About: <input type="text" name="about" value="editUser.vendor.about" [(ngModel)]="editUser.vendor.about"  /><br>
          <button class="btn btn-outline-success my-2 my-sm-0" type="submit" (click)="updateVendor(editUser)">Submit</button> &nbsp;&nbsp;
          <button class="btn btn-danger my-2 my-sm-0" type="submit" (click)="cancelEdit()">Cancel</button>
        </form>
      <br>
    </div>
</div>
