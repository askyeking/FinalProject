<form *ngIf="editUser">
    <h3>{{editUser.email}}</h3>
    <h6>{{editUser.password}}</h6>
    <br><br>

    <div class="form-row">
      <div class="form-group col-md-6">
        <label for="inputDisplayName">Display Name</label>
        <input type="text" class="form-control" id="inputDisplayName" [ngModelOptions]="{standalone: true}" [(ngModel)]="editUser.vendor.displayName" placeholder="{{editUser.vendor.displayName}}">
      </div>
        <div class="form-group col-md-6">
          <label for="inputImg">Image URL</label>
          <input type="text" class="form-control" id="inputImg" [ngModelOptions]="{standalone: true}" [(ngModel)]="editUser.vendor.imgUrl" placeholder="{{editUser.vendor.imgUrl}}">
        </div>
    </div>
    <div class="form-group">
        <label for="inputAbout">About</label>
        <textarea class="form-control" id="exampleFormControlTextarea1" [ngModelOptions]="{standalone: true}" [(ngModel)]="editUser.vendor.about" placeholder="{{editUser.vendor.about}}" rows="3"></textarea>
      </div>
      <br>
      <div class="btn-toolbar">
          <button class="btn btn-dark" type="submit" (click)="updateVendor(editUser)">Save</button> &nbsp;&nbsp;
          <button class="btn btn-secondary" type="submit" (click)="cancelEdit()">Cancel</button>
      </div>
  </form>

<br><br><br>
<div *ngIf="userViewed && !editUser">
    <div class="container">
      <div>
        <div class="row">
          <div class="col-sm-4">
            <div class="card">
              <h2>{{userViewed.vendor.displayName}}</h2>
             <br>
                <img *ngIf="userViewed.vendor.imgUrl" src="{{userViewed.vendor.imgUrl}}" alt="Image"><br>
                <h6>{{userViewed.vendor.about}}</h6>
                <br><br>
                <button class="btn btn-dark" *ngIf="isOriginalUser" (click)="setEditUser()">Edit Profile</button><br>
                <button class="btn btn-dark" *ngIf="isOriginalUser" (click)="viewInventory()">View Inventory</button>

              <hr class="d-sm-none">
            </div>
          </div>

          <div class="col-sm-8">
            <div class="card" *ngFor="let item of userViewed.vendor.listedItems | inactivizer">

                <h3>{{item.name}}</h3>
                <h6>{{item.description}}</h6>
                <div id="image">
                    <img class="card-img-top" [src]="item.imgUrl" alt="image">
                </div>
                <br>
                <h5>{{item.price | currency}}</h5>
                <p><strong>{{item.condition}} Condition </strong></p>
                 <button class="btn btn-dark" *ngIf="!item.rented && !isOriginalUser" (click)="rentItem(item.id)">Rent Me</button>
                 <button class="btn btn-dark" *ngIf="!item.rented && isOriginalUser" disabled>Rent Me</button>

            </div>
          </div>
        </div>
      </div>

</div>
