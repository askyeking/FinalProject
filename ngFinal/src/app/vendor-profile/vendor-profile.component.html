<div *ngIf="userViewed">
  <img src="{{userViewed.vendor.imgUrl}}" alt="">
  <button *ngIf="isOriginalUser" (click)="setEditUser()">Edit</button>
  <button *ngIf="isOriginalUser" (click)="viewInventory()">View Inventory</button>
  <h1>{{userViewed.vendor.displayName}}</h1>
    <h3>About</h3>
    {{userViewed.vendor.about}} <br>
    <hr>
  <br>
  <br>
  <br>
  <div *ngIf="!editUser">
  <h3>Inventory</h3>
  <div *ngIf="!userViewed.vendor.listedItems">
    No items posted.
  </div>
  <div  *ngFor="let item of userViewed.vendor.listedItems" class="card" style="width: 18rem;">
    <div *ngIf="item.active">
      <img class="card-img-top" [src]="item.imgUrl" alt="image">
      <div class="card-body">
        <h5 class="card-title">{{item.name}}</h5>
        <p class="card-text">{{item.description}}</p>
        <p class="card-text">{{item.price | currency}}</p>
        <p class="card-text">{{item.condition}}</p>
        <p class="card-text" *ngIf="item.rented">Item is currently rented</p>
        <p class="card-text" *ngIf="!item.rented">Item is available</p>
      </div>
        <button class="btn btn-primary" *ngIf="!item.rented && !isOriginalUser" (click)="rentItem(item.id)">Rent Me</button>
        <button class="btn btn-primary" *ngIf="!item.rented && isOriginalUser" disabled>Rent Me</button>
      </div>
  </div>
</div>

  <div *ngIf="editUser">
      <h1>{{editUser.email}}</h1>
      {{editUser.password}}
      <form action="">
          Name: <input type="text" name="name" value="editUser.vendor.displayName" [(ngModel)]="editUser.vendor.displayName"  /><br>
          Image URL: <input type="text" name="imageURL" value="editUser.vendor.imgUrl" [(ngModel)]="editUser.vendor.imgUrl"  /><br>
          About: <input type="text" name="about" value="editUser.vendor.about" [(ngModel)]="editUser.vendor.about"  /><br>
          <button class="btn btn-outline-success my-2 my-sm-0" type="submit" (click)="updateVendor(editUser)">Submit</button> &nbsp;&nbsp;
          <button class="btn btn-danger my-2 my-sm-0" type="submit" (click)="cancelEdit()">Cancel</button>
        </form>
      <br>
    </div>
</div>
