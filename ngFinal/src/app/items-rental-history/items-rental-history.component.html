<!-- Consider adding an itemView component that does not have rent option, or -->
<app-inventory-item-view></app-inventory-item-view>
<div *ngIf="itemViewed">
  <h1>{{itemViewed.name}} Rental History</h1>
  <div *ngFor="let rental of itemViewed.allRents">
    <hr>
      <div class="info">
       <p >Customer: {{rental.customer.displayName}}</p>
       <p>From: {{rental.startDate | date}}</p>
       <p>To: {{rental.endDate | date}}
       </p>
       <p class="return" *ngIf="!rental.active">Returned</p>
       <p class="no-return" *ngIf="rental.active">Not returned</p>
       <p>Amount paid {{rental.paidAmount}}</p>
       <p>Additional Info: {{rental.transactionInfo}}</p>
      </div>
    <hr>

  </div>

  <div *ngIf="itemViewed.allRents && itemViewed.allRents.length == 0">
    This item has not yet been rented.
  </div>

</div>
